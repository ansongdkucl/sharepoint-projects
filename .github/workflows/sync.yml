name: Aruba Port Sync (Self-Hosted)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install netmiko openpyxl python-dotenv requests

      - name: Show working directory
        run: |
          pwd
          ls -la

      - name: Execute Port Sync Script
        env:
          username: ${{ secrets.username }}
          passwordAD: ${{ secrets.passwordAD }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python config-ports-sync.py

      - name: Upload debug log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sync-debug
          path: |
            session_debug.txt
            *.log
          if-no-files-found: ignore
